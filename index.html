<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE SEUNGCHELIN GUIDE</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="THE SEUNGCHELIN GUIDE 홈">
        <span>THE</span>
        <strong>SEUNGCHELIN</strong>
        <span>GUIDE</span>
      </a>
      <nav class="nav-links" aria-label="주요 메뉴">
        <button
          class="menu-button"
          id="menu-button"
          type="button"
          aria-label="메뉴 열기"
          aria-expanded="false"
          aria-controls="menu-panel"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
      <div class="menu-panel" id="menu-panel" hidden>
        <nav class="menu-list" aria-label="사이트 메뉴">
          <a class="menu-item menu-item-primary" href="/mypage/">마이페이지</a>
          <a class="menu-item" href="/story/">승슐랭 이야기</a>
          <a class="menu-item" href="/scoring/">점수 평가 방식</a>
          <a class="menu-item" href="/best-meals/">BEST 급식</a>
          <a class="menu-item" href="/discussion/">토론의 장</a>
        </nav>
        <div class="auth-panel" aria-label="평가 권한">
          <p id="auth-status">로컬 데모 모드</p>
          <form id="auth-form">
            <input
              id="auth-username"
              type="text"
              autocomplete="username"
              placeholder="아이디"
              aria-label="로그인 아이디"
            />
            <div class="password-field">
              <button type="button" data-password-toggle="auth-password">보기</button>
              <input
                id="auth-password"
                type="password"
                autocomplete="current-password"
                placeholder="비밀번호"
                aria-label="로그인 비밀번호"
              />
            </div>
            <button type="submit">로그인</button>
          </form>
          <a class="signup-link" href="/signup/">회원가입</a>
          <div class="account-panel" id="account-panel" hidden>
            <span>계정</span>
            <strong id="account-username">사용자</strong>
            <p id="account-permission">평가 권한 확인 중</p>
          </div>
          <button id="sign-out-button" type="button" hidden>로그아웃</button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <div class="red-rule"></div>
          <p class="eyebrow">오늘의 급식 평가</p>
          <h1 id="page-title">THE SEUNGCHELIN GUIDE</h1>
          <p class="hero-text">
            아침, 점심, 저녁 급식을 한눈에 보고 별점을 남겨보세요.
          </p>
        </div>
      </section>

      <section class="meal-section" id="meals" aria-labelledby="meal-title">
        <div class="section-heading">
          <div>
            <div class="red-rule"></div>
            <p class="meal-date-label" id="meal-date-label">오늘</p>
            <h2 id="meal-title">오늘의 급식</h2>
          </div>
          <div class="date-controls" aria-label="급식 날짜 이동">
            <button
              class="arrow-button"
              id="prev-date-button"
              type="button"
              aria-label="이전 날짜 보기"
            >
              ‹
            </button>
            <time id="selected-date-label" datetime=""></time>
            <button
              class="arrow-button"
              id="next-date-button"
              type="button"
              aria-label="다음 날짜 보기"
            >
              ›
            </button>
          </div>
        </div>

        <div class="meal-grid" id="meal-grid" aria-live="polite">
          <div class="meal-loading">급식 정보를 불러오는 중입니다.</div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <strong>THE SEUNGCHELIN GUIDE</strong>
      <span>급식의 기록은 오늘의 한 끼에서 시작됩니다.</span>
    </footer>
  </body>
</html>

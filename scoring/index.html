<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/logo/logo_small.png" />
    <script type="module" src="/src/staticPage.js"></script>
  </head>
  <body class="info-page">
    <header class="site-header">
      <a class="brand" href="/" aria-label="THE SEUNGCHELIN GUIDE 홈">
        <img src="/logo/logo_main.png" alt="THE SEUNGCHELIN GUIDE" />
      </a>
      <nav class="nav-links" aria-label="주요 메뉴">
        <button
          class="menu-button"
          id="menu-button"
          type="button"
          aria-label="메뉴 열기"
          aria-expanded="false"
          aria-controls="menu-panel"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
      <div class="menu-panel" id="menu-panel" hidden>
        <nav class="menu-list" aria-label="사이트 메뉴">
          <a class="menu-item menu-item-primary" href="/mypage/">마이페이지</a>
          <a class="menu-item" href="/story/">승슐랭 이야기</a>
          <a class="menu-item" href="/scoring/">점수 평가 방식</a>
          <a class="menu-item" href="/best-meals/">BEST 식사</a>
          <a class="menu-item" href="/discussion/">토론의 장</a>
        </nav>
      </div>
    </header>

    <main class="info-main">
      <section class="info-hero" aria-labelledby="page-title">
        <div class="red-rule"></div>
        <p class="eyebrow">SEUNG's Rating</p>
        <h1 id="page-title">점수 평가 방식</h1>
        <p class="hero-text">단 3개의 별을 통한 훌륭한 평가.</p>
      </section>

      <section class="score-list" aria-label="점수 기준">
        <article>
          <span class="score-stars" role="img" aria-label="0스타">
            <img class="score-star inactive" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star inactive" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star inactive" src="/rate/MichelinStar.png" alt="" />
          </span>
          <p>맛이 특별한 인상을 남기지 못한 날.</p>
        </article>
        <article>
          <span class="score-stars" role="img" aria-label="1스타">
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star inactive" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star inactive" src="/rate/MichelinStar.png" alt="" />
          </span>
          <p>맛이 무난하여 먹을 만한 날.</p>
        </article>
        <article>
          <span class="score-stars" role="img" aria-label="2스타">
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star inactive" src="/rate/MichelinStar.png" alt="" />
          </span>
          <p>맛이 훌륭하여 반드시 취식해야 하는 날.</p>
        </article>
        <article>
          <span class="score-stars" role="img" aria-label="3스타">
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
          </span>
          <p>급식이 매우 훌륭하여 등교를 할 가치가 충분한 날.</p>
        </article>
        <article>
          <span class="score-stars hidden-pick" role="img" aria-label="히든 3스타">
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
            <img class="score-star active" src="/rate/MichelinStar.png" alt="" />
          </span>
          <p>그날의 식사를 대표할 만한 숨겨진 최고 평가.</p>
        </article>
      </section>
    </main>

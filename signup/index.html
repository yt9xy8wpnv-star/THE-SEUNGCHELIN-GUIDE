<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 | THE SEUNGCHELIN GUIDE</title>
    <link rel="icon" type="image/png" href="/logo/logo_small.png" />
    <link rel="apple-touch-icon" href="/logo/logo_small.png" />
    <script type="module" src="/src/signup.js"></script>
  </head>
  <body class="signup-page">
    <header class="site-header">
      <a class="brand" href="/" aria-label="THE SEUNGCHELIN GUIDE 홈">
        <img src="/logo/logo_main.png" alt="THE SEUNGCHELIN GUIDE" />
      </a>
      <nav class="nav-links" aria-label="주요 메뉴">
      </nav>
    </header>

    <main class="signup-main">
      <section class="signup-shell" aria-labelledby="signup-title">
        <div>
          <div class="red-rule"></div>
          <p class="eyebrow">새 평가자 등록</p>
          <h1 id="signup-title">회원가입</h1>
          <p class="hero-text">
            아이디와 비밀번호만 만들면 됩니다. 승인되면 급식 평가를 남길 수 있습니다.
          </p>
        </div>

        <form class="signup-card" id="signup-form">
          <p id="signup-status">모든 항목을 입력해주세요.</p>
          <label>
            <span>아이디</span>
            <input
              id="signup-username"
              type="text"
              autocomplete="username"
              placeholder="student01"
              required
            />
          </label>
          <label>
            <span>비밀번호</span>
            <div class="password-field">
              <button type="button" data-password-toggle="signup-password">보기</button>
              <input
                id="signup-password"
                type="password"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>
          </label>
          <label>
            <span>비밀번호 확인</span>
            <div class="password-field">
              <button type="button" data-password-toggle="signup-password-confirm">보기</button>
              <input
                id="signup-password-confirm"
                type="password"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>
          </label>
          <button type="submit">회원가입</button>
          <a href="/">이미 계정이 있어요</a>
        </form>
      </section>
    </main>
  </body>
</html>
